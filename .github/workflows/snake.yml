# Save this file as: .github/workflows/snake.yml  (in the SAME repo as your README)
# It regenerates the animated snake SVGs daily and pushes them to an "output" branch,
# which is exactly what the README's <picture> tag points to.

name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
